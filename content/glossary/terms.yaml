terms:
- term: HQLA
  full_name: High-Quality Liquid Assets
  definition: Assets that can be easily and immediately converted to cash at little
    or no loss of value. Defined in the LCR Rule (12 CFR Part 249) as Level 1, Level
    2A, or Level 2B assets.
  source: LCR Rule §249.3
  related_sections:
  - I.A.1
  - I.A.2
- term: Level 1 HQLA
  definition: The highest quality liquid assets including coins and bank notes, central
    bank reserves, and certain sovereign/central bank debt securities with 0% risk
    weight. No cap or haircut applies.
  source: LCR Rule §249.22
  related_sections:
  - I.A.1
- term: Level 2A HQLA
  definition: Liquid assets including certain sovereign, central bank, or GSE securities
    and covered bonds. Subject to a 15% haircut and capped at 40% of HQLA stock.
  source: LCR Rule §249.23
  related_sections:
  - I.A.1
- term: Level 2B HQLA
  definition: Lower quality liquid assets including qualifying non-financial corporate
    bonds and publicly traded equities. Subject to 25-50% haircuts and capped at 15%
    of HQLA stock.
  source: LCR Rule §249.24
  related_sections:
  - I.A.1
