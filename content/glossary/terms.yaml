- term: Secured Financing
  definition: Borrowing backed by collateral. In the FR 2052a context, secured outflows
    include repurchase agreements, securities lending transactions, and other collateralized
    borrowings reported under O.S.
  source: FR 2052a Instructions, O.S
  related_sections:
  - O.S.1
  - O.S.2
- term: Unsecured Financing
  definition: Borrowing not backed by specific collateral. Reported under O.W (wholesale)
    or O.D (deposits). Includes commercial paper, long-term debt, federal funds purchased,
    and unsecured interbank borrowings.
  source: FR 2052a Instructions, O.W, O.D
  related_sections:
  - O.W.1
  - O.D.1
