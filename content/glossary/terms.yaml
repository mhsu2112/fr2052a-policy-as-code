- term: Daily Reporter
  definition: A reporting entity required to submit the FR 2052a on a daily basis.
    Includes Category I, Category II, and Category III companies with short-term wholesale
    funding of $75 billion or more.
  source: FR 2052a Instructions, Frequency
  related_sections: []
- term: Monthly Reporter
  definition: A reporting entity required to submit the FR 2052a on a monthly basis.
    Includes Category III companies with short-term wholesale funding below $75 billion
    and Category IV companies.
  source: FR 2052a Instructions, Frequency
  related_sections: []
- term: G-SIB
  full_name: Global Systemically Important Bank
  definition: A banking organization identified by the Financial Stability Board as
    globally systemically important, subject to enhanced capital and liquidity requirements.
    U.S. G-SIBs are Category I firms under Regulation YY.
  source: Regulation YY (12 CFR Part 252); Basel Committee on Banking Supervision
  related_sections: []
