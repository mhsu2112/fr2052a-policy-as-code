- term: Category I Banking Organization
  definition: A U.S. bank holding company or savings and loan holding company identified
    as a U.S. global systemically important bank (G-SIB) under 12 CFR 252.5. Subject
    to daily FR 2052a reporting.
  source: Regulation YY (12 CFR 252.5)
  related_sections: []
- term: Category II Banking Organization
  definition: A U.S. banking organization with $700 billion or more in total consolidated
    assets, or $75 billion or more in cross-jurisdictional activity. Subject to daily
    FR 2052a reporting.
  source: Regulation YY (12 CFR 252.5)
  related_sections: []
- term: Category III Banking Organization
  definition: A U.S. banking organization with $250 billion or more in total consolidated
    assets, or meeting certain thresholds in nonbank assets, weighted short-term wholesale
    funding, or off-balance-sheet exposure. Daily reporters if STWF >= $75B; otherwise
    monthly.
  source: Regulation YY (12 CFR 252.5)
  related_sections: []
- term: Category IV Banking Organization
  definition: A U.S. banking organization with $100 billion or more in total consolidated
    assets that does not meet the thresholds for Category I, II, or III. Subject to
    monthly FR 2052a reporting.
  source: Regulation YY (12 CFR 252.5)
  related_sections: []
