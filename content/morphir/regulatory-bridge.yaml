  - morphir_rule: "32(k)"
    cfr_section: "§249.32(k)"
    cfr_topic: "Collateral posting obligations for derivatives (downgrade triggers)"
    notes: >
      Predicate commented out in Outflows.elm. §249.32(k) covers the additional
      collateral that would need to be posted on derivative contracts if the
      bank's credit rating were downgraded by 1, 2, or 3 notches. In the 2025
      FR 2052a, O.O.13 (Total Collateral Required Due to 1 Notch Downgrade),
      O.O.14 (2 Notch Downgrade), O.O.15 (3 Notch Downgrade), and O.O.16
      (Change in Financial Condition) capture this information across four
      separate line items — considerably more granular than a single Morphir
