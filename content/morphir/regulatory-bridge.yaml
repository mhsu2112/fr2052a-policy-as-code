version_notes: |
  The Morphir sample references FR 2052a version 2019-03-31. This site uses
  version 2025-02-26. Three interim revisions occurred (2022-04-29, 2023-03-01,
  2025-02-26). Mappings in this file are built against the 2025 form structure.
  Where section IDs, definitions, or counterparty enumerations have changed
  between versions, the notes field on each entry documents the discrepancy.

  Key structural differences between the 2019 and 2025 form that affect mappings:

  1. HQLA asset categories: The 2025 form explicitly uses LRM Standards asset
     categories (Level 1, Level 2A, Level 2B, Non-HQLA) as [Sub-Product] and
     [Collateral Class] enumeration values in I.A, I.S, and O.S sections. These
     align more precisely with §249.20 HQLA definitions than the 2019 form, which
     used less standardized labeling. This improves traceability for the §249.20
     and §249.32(g) rules.

  2. O.S.6 (Exceptional Central Bank Operations): This section added sub-product
     granularity (FRB, SNB, BOE, ECB, etc.) post-2019, improving traceability
     for §249.32(f) central bank-backed secured transactions.

  3. O.O sections expansion: The 2025 form has more granular derivative-related
     sections (O.O.8 MTM Impact, O.O.9-O.O.16 downgrade collateral scenarios,
     O.O.20 Net 30-Day Derivative Payables) than the 2019 form. The Morphir
     not-implemented rules §249.32(j) and §249.32(k) would each map to multiple
     2025 form sections if implemented.

  4. Counterparty taxonomy: The [Counterparty] enumeration has been standardized
     across all O.D, O.W, O.S, O.O, I.A, I.U, I.S, and I.O sections in the
     2025 form, with a consistent list (Retail, Small Business, Non-Financial
     Corporate, Sovereign, Central Bank, GSE, PSE, MDB, Other Supranational,
     Pension Fund, Bank, Broker-Dealer, Investment Company or Advisor, Financial
     Market Utility, Other Supervised Non-Bank Financial Entity, Non-Regulated
     Fund, Internal). This consistency improves applicability of counterparty-
     based Morphir predicates (e.g., for §249.32(b), (c), (d), (h) rules).

  5. Deposit section restructuring: The 2025 form has 15 deposit subcategories
     (O.D.1-O.D.15) covering transactional, relationship, non-relationship,
     operational, excess operational, non-operational, operational escrow,
     brokered (non-reciprocal), affiliated sweep (stable/less stable),
     non-affiliated sweep, other product sweep, reciprocal, third-party, and
     other accounts. The 2019 form had fewer such subcategories. The mapping of
     §249.32(a)(1)-(5) to specific O.D sections reflects 2025 form structure;
     these same regulatory provisions may have mapped to fewer, broader sections
     in the 2019 form.
