[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Dummy DATABASE_URL so prisma generate succeeds without a real DB
  DATABASE_URL = "postgresql://placeholder:placeholder@localhost:5432/placeholder"
  # Disable NextAuth in production unless configured
  NEXTAUTH_URL = "https://localhost"
  NEXTAUTH_SECRET = "netlify-build-placeholder"

# Next.js plugin is auto-detected by Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"
